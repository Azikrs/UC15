<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cabeçalho">
        <h1>Formulário</h1>
        <h2>Preencha os campos abaixo</h2>
    </div>
    <div class="formulario">
        <form>
        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
        </div>
        <div class="campo">
            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome">
        </div>
        <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email">
        </div>
        <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
        </div>
        <div class="campo">
            <label for="Nascimento">Data de Nascimento</label>
            <input type="date" id="Nascimento" name="Nascimento" placeholder="Digite sua data de nascimento">
        </div>
        <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(##) #####-####">
        </div>
        <div class="campo">
            <label for="estado">Estado</label>
            <select id="estado" name="estado">
                <option>Rio de Janeiro</option>
                <option>São Paulo</option>
                <option>Minas Gerais</option>
                <option>Ceará</option>
            </select>
            </form>
        </div>
        <div class="botao">
            <button class="button" type="submit">Enviar</button>
        </div>
    </div>
</body>
</html>
